<!DOCTYPE html>
<html>
<head>
  <title>Northgate Neighborhood Garage Sale Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    :root { --brand: #2563eb; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 360px;
      background: white;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }

    #header {
      padding: 14px;
      border-bottom: 1px solid #eee;
    }

    #title { font-size: 18px; font-weight: 700; }
    #subtitle { font-size: 12px; color: #666; margin-top: 4px; }

    #search {
      padding: 12px;
      border: none;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
      outline: none;
    }

    #results { overflow-y: auto; flex: 1; }

    .card {
      padding: 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .card:hover { background: #f5f7fa; }

    .address { font-size: 14px; font-weight: 500; }
    .small { font-size: 12px; color: #666; }

    #map { flex: 1; }

    @media (max-width: 768px) {
      body { flex-direction: column; }
      #sidebar {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 45vh;
        border-radius: 16px 16px 0 0;
      }
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
        height: 100vh;
      }
    }
  </style>
</head>

<body>

<div id="sidebar">
  <div id="header">
    <div id="title">Northgate Garage Sale Map</div>
    <div id="subtitle">2026 Neighborhood Event</div>
  </div>

  <input id="search" placeholder="Search items..." />
  <div id="results"></div>
</div>

<div id="map"></div>

<script>

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTQWdlA3FA_3Ea7lBmVTYHtRpnZdGWWeLWR3nR6kDYit9rLPKyUtokTx1ikLzrxmYFqL2cz9RWhHZZz/pub?gid=713749718&single=true&output=csv";

// MAP
let map = L.map('map').setView([37.8986, -122.0618], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OpenStreetMap'
}).addTo(map);

// DATA
let allData = [];
let markers = [];

// CLEAR MARKERS
function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

// SIMPLE CSV PARSER
function parseCSV(csv) {
  const lines = csv.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.replace(/"/g, "").trim());

  return lines.slice(1).map(line => {
    let values = line.split(",");
    let obj = {};
    headers.forEach((h, i) => obj[h] = (values[i] || "").replace(/"/g, "").trim());
    return obj;
  });
}

// MARKERS
function createMarker(row) {

  const lat = parseFloat(row.Latitude);
  const lng = parseFloat(row.Longitude);

  if (isNaN(lat) || isNaN(lng)) return;

  const marker = L.marker([lat, lng]).addTo(map);

  marker.bindPopup(`
    <b>${row.Address || "No address"}</b>
    <br>
    <a target="_blank"
       href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}">
      Directions
    </a>
  `);

  markers.push(marker);
}

// RENDER
function render(term = "") {

  clearMarkers();

  let filtered = allData.filter(r =>
    Object.values(r).some(v =>
      v && v.toLowerCase().includes(term.toLowerCase())
    )
  );

  const results = document.getElementById("results");
  results.innerHTML = "";

  filtered.forEach(row => {

    createMarker(row);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="address">${row.Address || "No address"}</div>
      <div class="small">Tap to view</div>
    `;

    div.onclick = () => {
      const lat = parseFloat(row.Latitude);
      const lng = parseFloat(row.Longitude);
      if (!isNaN(lat)) map.setView([lat, lng], 17);
    };

    results.appendChild(div);
  });
}

// LOAD DATA
async function loadData() {
  try {
    const res = await fetch(SHEET_URL + "?t=" + Date.now());
    const csv = await res.text();

    allData = parseCSV(csv);

    console.log("Loaded rows:", allData.length);

    render(document.getElementById("search").value);

  } catch (e) {
    console.error("CSV load failed:", e);
  }
}

// SEARCH
document.getElementById("search").addEventListener("input", (e) => {
  render(e.target.value);
});

// INIT
loadData();
setInterval(loadData, 30000);

</script>

</body>
</html>
