<!DOCTYPE html>
<html>
<head>
  <title>Walnut Creek Garage Sale Map (94598)</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: #f5f6f8;
    }

    #topbar {
      background: white;
      padding: 12px;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .title {
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 16px;
    }

    #search {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    #search:focus {
      border-color: #4a90e2;
    }

    .filters {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filters label {
      background: #f0f2f5;
      padding: 6px 10px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }

    #map {
      height: calc(100vh - 140px);
      width: 100%;
    }
  </style>
</head>

<body>

<div id="topbar">
  <div class="title">📍 Walnut Creek Garage Sale Map (94598)</div>
  <input id="search" placeholder="Search (romance books, tools, toys...)" />
</div>

<div id="map"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSVajdzKrksVrstLNnB6WvUYSWfawJuLSszIEbu4kH_kfBlyevUuPEIXgU-zdzgN5Vg3wbQNSvRZKZP/pub?gid=1475063241&single=true&output=csv";

let map = L.map('map').setView([37.8986, -122.0618], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OpenStreetMap'
}).addTo(map);

let allData = [];
let markers = [];

// store marker references for highlighting
let markerIndex = [];

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  markerIndex = [];
}

function addMarkers(data, highlightTerm = "") {
  clearMarkers();

  data.forEach(row => {

    let lat = parseFloat(row.Latitude);
    let lng = parseFloat(row.Longitude);

    if (isNaN(lat) || isNaN(lng)) return;

    let address = row.Address || "No address";

    let isMatch = highlightTerm &&
      address.toLowerCase().includes(highlightTerm.toLowerCase());

    let marker = L.marker([lat, lng]);

    // highlight matched pins
    if (isMatch) {
      marker.setOpacity(1);
      marker.bindTooltip("MATCH", { permanent: false });

      marker.setIcon(new L.Icon({
        iconUrl: "https://maps.google.com/mapfiles/ms/icons/red-dot.png",
        iconSize: [32, 32]
      }));
    } else {
      marker.setOpacity(0.6);
    }

    let popup = `
      <div style="font-size:14px;">
        ${address}<br><br>
        <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}" target="_blank">
          Directions
        </a>
      </div>
    `;

    marker.bindPopup(popup);

    marker.addTo(map);
    markers.push(marker);
    markerIndex.push({ marker, row });
  });
}

function parseCSV(csv) {
  const lines = csv.split("\n");
  const headers = lines[0].split(",").map(h => h.trim());

  let results = [];

  for (let i = 1; i < lines.length; i++) {
    let line = lines[i];
    if (!line.trim()) continue;

    let values = [];
    let current = "";
    let insideQuotes = false;

    for (let char of line) {
      if (char === '"') insideQuotes = !insideQuotes;
      else if (char === "," && !insideQuotes) {
        values.push(current);
        current = "";
      } else {
        current += char;
      }
    }
    values.push(current);

    let obj = {};
    headers.forEach((h, i) => {
      obj[h] = (values[i] || "").replace(/"/g, "").trim();
    });

    results.push(obj);
  }

  return results;
}

function searchData(term) {
  if (!term) return allData;

  term = term.toLowerCase();

  return allData.filter(row => {
    return Object.values(row).some(v =>
      v && v.toString().toLowerCase().includes(term)
    );
  });
}

// MAIN SEARCH LOGIC (FIXED)
function applySearch() {
  let term = document.getElementById("search").value.trim();

  let filtered = searchData(term);

  addMarkers(filtered, term);
}

async function loadData() {
  let res = await fetch(SHEET_URL + "&cache=" + Date.now());
  let csv = await res.text();

  allData = parseCSV(csv);

  console.log("Loaded rows:", allData.length);

  addMarkers(allData);
}

// EVENTS
document.getElementById("search").addEventListener("input", applySearch);

// INIT
loadData();

// auto refresh from Google Form
setInterval(loadData, 30000);

</script>

</body>
</html>
