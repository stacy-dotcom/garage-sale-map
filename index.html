<!DOCTYPE html>
<html>
<head>
  <title>Northgate Neighborhood 35th Annual Garage Sale Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    :root {
      --brand: #2563eb;
      --bg: #f8fafc;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      display: flex;
      height: 100vh;
    }

    /* SIDEBAR */
    #sidebar {
      width: 360px;
      background: white;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }

    #header {
      padding: 14px;
      border-bottom: 1px solid #eee;
    }

    #title {
      font-size: 18px;
      font-weight: 700;
    }

    #subtitle {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    #search {
      padding: 12px;
      border: none;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
      outline: none;
    }

    #search:focus {
      background: #eff6ff;
    }

    #results {
      overflow-y: auto;
      flex: 1;
    }

    .card {
      padding: 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .card:hover {
      background: #f5f7fa;
    }

    .address {
      font-size: 14px;
      font-weight: 500;
    }

    .small {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    .highlight {
      border-left: 4px solid var(--brand);
      background: #eff6ff;
    }

    #footer {
      padding: 10px;
      font-size: 11px;
      color: #888;
      border-top: 1px solid #eee;
    }

    /* MAP */
    #map {
      flex: 1;
    }
  </style>
</head>

<body>

<div id="sidebar">

  <div id="header" style="display:flex; align-items:center; gap:10px;">

  <img src="https://torreyteamrealestate.com/wp-content/uploads/2019/01/cropped-TorreyTeam_Monogram_Black-1-1.jpg"
       style="width:38px; height:38px; border-radius:8px;" />

  <div>
    <div style="font-size:18px; font-weight:700;">
      Northgate Neighborhood Garage Sale
    </div>
    <div style="font-size:12px; color:#666;">
      35th Annual Garage Sale • In Honor of Pete Torrey • 2026
    </div>
  </div>

</div>
  <input id="search" placeholder="Search items (tools, furniture, toys...)" />
  <div id="results"></div>

  <div id="footer">
    Powered by The Torrey Team DRE#01433553 • Leaflet + Google Sheets
  </div>

</div>

<div id="map"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSFeoQavoTKuIx4hEK4XcdSEK4eFr2-NcRFqk2OhvmJMSaOPgXoaQNuLOE_X6rvaKnzrsnoPp-AdcVk/pub?gid=2039456840&single=true&output=csv";

// MAP
let map = L.map('map').setView([37.8986, -122.0618], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OpenStreetMap'
}).addTo(map);

// DATA
let allData = [];
let markers = [];
let markerMap = new Map();

// CLEAR
function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  markerMap.clear();
}

// -----------------------------
// SAFE CSV PARSER (FIXED)
// -----------------------------
function parseCSV(csv) {
  const lines = csv.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.replace(/"/g, "").trim());

  let results = [];

  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;

    let values = [];
    let current = "";
    let insideQuotes = false;

    for (let char of lines[i]) {
      if (char === '"') insideQuotes = !insideQuotes;
      else if (char === "," && !insideQuotes) {
        values.push(current);
        current = "";
      } else {
        current += char;
      }
    }
    values.push(current);

    let obj = {};
    headers.forEach((h, idx) => {
      obj[h] = (values[idx] || "").replace(/"/g, "").trim();
    });

    results.push(obj);
  }

  return results;
}

// -----------------------------
// MARKER CREATION (FIXED + BRANDED POPUP)
// -----------------------------
function createMarker(row, index) {

  let lat = parseFloat(row.Latitude);
  let lng = parseFloat(row.Longitude);

  if (isNaN(lat) || isNaN(lng)) return null;

  let marker = L.marker([lat, lng]).addTo(map);

  // ONLY show item fields
  let details = "";

  const exclude = [
    "Address",
    "Latitude",
    "Longitude",
    "Email",
    "Phone Number",
    "Timestamp",
    "Contact"
  ];

  for (let key in row) {
    if (!exclude.includes(key) && row[key]) {
      details += `<div><b>${key}:</b> ${row[key]}</div>`;
    }
  }

  let popup = `
    <div style="font-size:14px; max-width:260px;">

      <b>${row.Address || "No address"}</b>

      <hr>

      ${details || "<i>No items listed</i>"}

      <hr>

      <a style="color:#2563eb; font-weight:600;"
         href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}"
         target="_blank">
        🧭 Get Directions
      </a>

    </div>
  `;

  marker.bindPopup(popup);

  markers.push(marker);
  markerMap.set(index, marker);

  return marker;
}

// -----------------------------
// SEARCH
// -----------------------------
function searchData(term) {
  if (!term) return allData;

  term = term.toLowerCase();

  return allData.filter(row =>
    Object.values(row).some(v =>
      v && v.toString().toLowerCase().includes(term)
    )
  );
}

// -----------------------------
// RENDER
// -----------------------------
function render(term = "") {

  let filtered = searchData(term);

  clearMarkers();

  let resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  filtered.forEach((row, i) => {

    let marker = createMarker(row, i);

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="address">${row.Address || "No address"}</div>
      <div class="small">Tap to view on map</div>
    `;

    div.onclick = () => {
      if (!marker) return;

      map.setView(marker.getLatLng(), 17);
      marker.openPopup();

      document.querySelectorAll(".card").forEach(c => c.classList.remove("highlight"));
      div.classList.add("highlight");
    };

    resultsDiv.appendChild(div);
  });
}

// -----------------------------
// LOAD DATA
// -----------------------------
async function loadData() {
  let res = await fetch(SHEET_URL + "&t=" + Date.now());
  let csv = await res.text();

  allData = parseCSV(csv);

  console.log("Loaded rows:", allData.length);

  render(document.getElementById("search").value);
}

// SEARCH INPUT
document.getElementById("search").addEventListener("input", (e) => {
  render(e.target.value);
});

// INIT
loadData();

// AUTO REFRESH
setInterval(loadData, 30000);

</script>

</body>
</html>
