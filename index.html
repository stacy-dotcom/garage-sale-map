<!DOCTYPE html>
<html>
<head>
  <title>Northgate Neighborhood 35th Annual Garage Sale Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      display: flex;
      height: 100vh;
    }

    /* LEFT PANEL (ZILLOW STYLE) */
    #sidebar {
      width: 360px;
      background: white;
      border-right: 1px solid #ddd;
      display: flex;
      flex-direction: column;
    }

    #search {
      padding: 12px;
      border: none;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
      outline: none;
    }

    #results {
      overflow-y: auto;
      flex: 1;
    }

    .card {
      padding: 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .card:hover {
      background: #f5f7fa;
    }

    .address {
      font-size: 14px;
      font-weight: 500;
    }

    .small {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    /* MAP SIDE */
    #map {
      flex: 1;
    }

    .highlight {
      border-left: 4px solid #e11d48;
      background: #fff5f5;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <input id="search" placeholder="Search (romance books, tools, weights, golf, toys...)" />
  <div id="results"></div>
</div>

<div id="map"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSFeoQavoTKuIx4hEK4XcdSEK4eFr2-NcRFqk2OhvmJMSaOPgXoaQNuLOE_X6rvaKnzrsnoPp-AdcVk/pub?gid=2039456840&single=true&output=csv";

// MAP
let map = L.map('map').setView([37.8986, -122.0618], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'OpenStreetMap'
}).addTo(map);

// DATA
let allData = [];
let markers = [];
let markerMap = new Map();

// CLEAR MARKERS
function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  markerMap.clear();
}

// CREATE MARKER
function createMarker(row, index) {
  let lat = parseFloat(row.Latitude);
  let lng = parseFloat(row.Longitude);

  if (isNaN(lat) || isNaN(lng)) return null;

  let marker = L.marker([lat, lng]).addTo(map);

  let details = "";

for (let key in row) {
  if (
    key !== "Address" &&
    key !== "Latitude" &&
    key !== "Longitude" &&
    row[key]
  ) {
    details += `<div><b>${key}:</b> ${row[key]}</div>`;
  }
}

let popup = `
  <div style="font-size:14px; max-width:260px;">

    <b>${row.Address || "No address"}</b>

    <hr>

    ${details || "<i>No item details listed</i>"}

    <hr>

    <a href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}" target="_blank">
      🧭 Directions
    </a>

  </div>
`;

  marker.bindPopup(popup);

  markers.push(marker);
  markerMap.set(index, marker);

  return marker;
}

// SEARCH
function searchData(term) {
  if (!term) return allData;

  term = term.toLowerCase();

  return allData.filter(row =>
    Object.values(row).some(v =>
      v && v.toString().toLowerCase().includes(term)
    )
  );
}

// RENDER LIST + MAP (ZILLOW CORE)
function render(term = "") {

  let filtered = searchData(term);

  clearMarkers();

  let resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  filtered.forEach((row, i) => {

    let marker = createMarker(row, i);

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="address">${row.Address || "No address"}</div>
      <div class="small">Tap to view on map</div>
    `;

    div.onclick = () => {
      if (!marker) return;

      map.setView(marker.getLatLng(), 17);
      marker.openPopup();

      document.querySelectorAll(".card").forEach(c => c.classList.remove("highlight"));
      div.classList.add("highlight");
    };

    resultsDiv.appendChild(div);
  });
}

// PARSE CSV
function parseCSV(csv) {
  const lines = csv.split("\n");
  const headers = lines[0].split(",").map(h => h.trim());

  let results = [];

  for (let i = 1; i < lines.length; i++) {
    let line = lines[i];
    if (!line.trim()) continue;

    let values = [];
    let current = "";
    let insideQuotes = false;

    for (let char of line) {
      if (char === '"') insideQuotes = !insideQuotes;
      else if (char === "," && !insideQuotes) {
        values.push(current);
        current = "";
      } else {
        current += char;
      }
    }
    values.push(current);

    let obj = {};
    headers.forEach((h, i) => {
      obj[h] = (values[i] || "").replace(/"/g, "").trim();
    });

    results.push(obj);
  }

  return results;
}

// LOAD DATA
async function loadData() {
  let res = await fetch(SHEET_URL + "&cache=" + Date.now());
  let csv = await res.text();

  allData = parseCSV(csv);

  console.log("Loaded rows:", allData.length);

  render(document.getElementById("search").value);
}

// SEARCH INPUT
document.getElementById("search").addEventListener("input", (e) => {
  render(e.target.value);
});

// INIT
loadData();

// AUTO REFRESH (Google Form updates)
setInterval(loadData, 30000);

</script>

</body>
</html>
